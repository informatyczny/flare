<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FLARE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }
    .header {
      background: #1877f2;
      color: white;
      padding: 10px 12px;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header svg { flex-shrink: 0; }
    .body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    label { display: flex; flex-direction: column; gap: 3px; font-weight: 500; color: #555; }
    input {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 13px;
      width: 100%;
    }
    input:focus { outline: none; border-color: #1877f2; }
    button {
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      align-self: flex-start;
    }
    button:hover { background: #166fe5; }
    .status {
      padding: 7px 9px;
      border-radius: 4px;
      font-size: 12px;
      background: #f0f2f5;
      color: #555;
      word-break: break-word;
    }
    .status.published { background: #e6f4ea; color: #1e7e34; }
    .status.duplicate { background: #fff8e1; color: #856404; }
    .status.error     { background: #fdecea; color: #c62828; }
    .divider { height: 1px; background: #eee; }
    .section-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
      <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
    </svg>
    FLARE
  </div>
  <div class="body">
    <span class="section-title">Last captured</span>
    <div id="status" class="status idle">No events captured yet.</div>
    <div class="divider"></div>
    <span class="section-title">Settings</span>
    <label>
      Backend URL
      <input id="backendUrl" type="text" placeholder="http://localhost:8000" />
    </label>
    <button id="save">Save</button>
  </div>
  <script src="dist/popup.js"></script>
</body>
</html>
