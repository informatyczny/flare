<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FLARE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      color: #222;
      background: #fff;
    }
    .header {
      background: #1877f2;
      color: white;
      padding: 10px 12px;
      font-weight: 600;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
    .section-title {
      font-size: 11px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .divider { height: 1px; background: #eee; }
    label { display: flex; flex-direction: column; gap: 3px; font-weight: 500; color: #555; }
    input[type="text"], input[type="password"] {
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 5px 8px;
      font-size: 13px;
      width: 100%;
      font-family: monospace;
    }
    input[type="text"]:focus, input[type="password"]:focus {
      outline: none;
      border-color: #1877f2;
    }
    button {
      background: #1877f2;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    button:hover:not(:disabled) { background: #166fe5; }
    button:disabled { background: #999; cursor: not-allowed; }
    .btn-ghost {
      background: transparent;
      color: #1877f2;
      border: 1px solid #ddd;
      font-weight: 500;
    }
    .btn-ghost:hover:not(:disabled) { background: #f0f4ff; }
    .btn-danger {
      background: #c62828;
    }
    .btn-danger:hover:not(:disabled) { background: #8b0000; }
    .pubkey-box {
      font-family: monospace;
      font-size: 12px;
      background: #f0f2f5;
      padding: 5px 8px;
      border-radius: 4px;
      word-break: break-all;
      color: #444;
      flex: 1;
    }
    .pubkey-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status {
      padding: 7px 9px;
      border-radius: 4px;
      font-size: 12px;
      background: #f0f2f5;
      color: #555;
      word-break: break-word;
    }
    .status.published { background: #e6f4ea; color: #1e7e34; }
    .status.error     { background: #fdecea; color: #c62828; }
    .relay-result {
      font-size: 11px;
      padding: 2px 0;
      font-family: monospace;
    }
    .relay-ok  { color: #1e7e34; }
    .relay-err { color: #c62828; }
    .relay-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 0;
      border-bottom: 1px solid #f0f2f5;
    }
    .relay-url {
      flex: 1;
      font-family: monospace;
      font-size: 11px;
      word-break: break-all;
      color: #444;
    }
    .remove-btn {
      background: transparent;
      color: #c62828;
      border: none;
      padding: 0 4px;
      font-size: 16px;
      line-height: 1;
      cursor: pointer;
      font-weight: 700;
    }
    .remove-btn:hover { color: #8b0000; background: transparent; }
    .relay-add-row {
      display: flex;
      gap: 6px;
    }
    .relay-add-row input { flex: 1; }
    .relay-add-row button { flex-shrink: 0; padding: 5px 10px; }
    .error-msg { color: #c62828; font-size: 12px; min-height: 16px; }
    .or-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #aaa;
      font-size: 11px;
    }
    .or-divider::before, .or-divider::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #eee;
    }
    .import-row {
      display: flex;
      gap: 6px;
    }
    .import-row input { flex: 1; }
    .import-row button { flex-shrink: 0; padding: 5px 10px; }
    #setupSection { display: none; flex-direction: column; gap: 10px; }
    #mainSection  { display: none; }
    #keyPanel     { display: none; flex-direction: column; gap: 8px;
                    background: #f8f9fa; border-radius: 6px; padding: 10px; }
  </style>
</head>
<body>
  <div class="header">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
      <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
    </svg>
    FLARE
  </div>
  <div class="body">

    <!-- ── Setup screen ── -->
    <div id="setupSection">
      <span class="section-title">Set up your identity</span>

      <button id="generateBtn">Generate new keypair</button>

      <div class="or-divider">or import existing key</div>

      <div class="import-row">
        <input
          id="setupImportInput"
          type="password"
          placeholder="nsec1… or 64-char hex"
        />
        <button id="setupImportBtn" class="btn-ghost">Import</button>
      </div>
      <div id="setupImportError" class="error-msg"></div>
    </div>

    <!-- ── Main screen ── -->
    <div id="mainSection">

      <!-- Identity -->
      <span class="section-title">Your identity</span>
      <div class="pubkey-row">
        <div class="pubkey-box" id="pubkeyDisplay" title="">…</div>
        <button id="copyKeyBtn" class="btn-ghost" style="font-size:11px;padding:5px 8px;">Copy</button>
        <button id="manageKeyBtn" class="btn-ghost" style="font-size:11px;padding:5px 8px;">Manage key</button>
      </div>

      <!-- Key management panel -->
      <div id="keyPanel">
        <button id="regenerateKeyBtn" class="btn-danger" style="font-size:12px;padding:5px 10px;">Generate new keypair</button>
        <div class="or-divider">or import</div>
        <div class="import-row">
          <input
            id="mainImportInput"
            type="password"
            placeholder="nsec1… or 64-char hex"
          />
          <button id="mainImportBtn" class="btn-ghost">Import</button>
        </div>
        <div id="mainImportError" class="error-msg"></div>
      </div>

      <div class="divider"></div>

      <!-- Status -->
      <span class="section-title">Last captured</span>
      <div id="status" class="status idle">No events captured yet.</div>
      <div id="relayResults"></div>

      <div class="divider"></div>

      <!-- Relay / output nodes -->
      <span class="section-title">Output nodes</span>
      <div id="relayList"></div>
      <div class="relay-add-row">
        <input id="newRelay" type="text" placeholder="wss://relay.example.com" />
        <button id="addRelayBtn">Add</button>
      </div>

    </div>

  </div>
  <script src="dist/popup.js"></script>
</body>
</html>
